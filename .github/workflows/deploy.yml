name: Deploy nerdydad.me to Cloudflare Pages

on:
  push:
    branches:
      - main  # Adjust if your default branch is 'master'
  workflow_dispatch: # Allows you to manually trigger the build from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Essential for Hugo themes
          fetch-depth: 0        # Needed for Hugo's .Lastmod feature

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true        # Required for most modern themes (SASS/SCSS)

      - name: Build Site
        run: hugo --gc --minify

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: nerdydad-me-blog # Ensure this matches your project name in Cloudflare
          directory: public     # Hugo outputs the static site here
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}