name: Deploy nerdydad.me to Cloudflare Pages

on:
  push:
    branches:
      - main  # Adjust if your default branch is 'master'
  workflow_dispatch: # Allows you to manually trigger the build from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Essential for Hugo themes
          fetch-depth: 0        # Needed for Hugo's .Lastmod feature

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true        # Required for most modern themes (SASS/SCSS)

      - name: Build Site
        run: hugo --gc --minify

      - name: Publish to Cloudflare Pages (Global Auth Test)
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=nerdydad-me --branch=main
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}